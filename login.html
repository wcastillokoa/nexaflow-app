<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaFlow - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: #1A1A2E; min-height: 100vh; display: flex; flex-direction: column; margin: 0; font-family: 'Inter', sans-serif;">

    <nav class="navbar" style="background-color: #1A1A2E;">
        <div class="logo"><a href="index.html" style="color: white; text-decoration: none; font-weight: 700;">NexaFlow</a></div>
        <div class="menu">
            <a href="index.html">Home</a>
            <a href="producto.html">Producto</a>
            <a href="precios.html">Precios</a>
            <a href="blog.html">Blog</a>
            <a href="login.html" class="active">Login</a>
        </div>
    </nav>
    
    <div class="login-page" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="login-card" style="background: #FFFFFF; padding: 40px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <h2 style="text-align: center; margin-bottom: 8px; color: #1A1A2E; font-size: 1.8rem; font-weight: 700;">NexaFlow</h2>
            <p style="text-align: center; color: #666666; font-size: 0.9rem; margin-bottom: 28px;">Introduce tus credenciales para acceder</p>
            
            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 6px; font-weight: 500; color: #333333; font-size: 0.9rem;">Correo electrónico</label>
                    <input type="email" class="form-control" placeholder="ejemplo@empresa.com" required style="width: 100%; padding: 12px; border: 1px solid #CBD5E1; border-radius: 6px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box;">
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 6px; font-weight: 500; color: #333333; font-size: 0.9rem;">Contraseña</label>
                    <input type="password" class="form-control" placeholder="••••••••" required style="width: 100%; padding: 12px; border: 1px solid #CBD5E1; border-radius: 6px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box;">
                </div>

                <button type="button" onclick="window.location.href='dashboard.html';" style="width: 100%; background-color: #E94560; color: #FFFFFF; padding: 14px; border: none; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; display: block; text-align: center; box-sizing: border-box; transition: background 0.2s;">
                    Iniciar sesión
                </button>
            </form>

            <div style="text-align: center; margin: 24px 0; color: #94A3B8; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.5px;">O CONTINUAR CON</div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button type="button" onclick="window.location.href='dashboard.html';" style="color: #333333; border: 1px solid #CBD5E1; text-align: center; font-size: 0.9rem; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 500; background: #FFFFFF; display: block; width: 100%; font-family: inherit;">Google</button>
                <button type="button" onclick="window.location.href='dashboard.html';" style="color: #333333; border: 1px solid #CBD5E1; text-align: center; font-size: 0.9rem; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 500; background: #FFFFFF; display: block; width: 100%; font-family: inherit;">GitHub</button>
            </div>

            <p style="text-align: center; font-size: 0.85rem; margin-top: 28px; color: #666666;">
                <a href="#" style="color: #E94560; text-decoration: none; font-weight: 500;">¿Olvidaste tu contraseña?</a> o <a href="#" style="color: #E94560; text-decoration: none; font-weight: 500;">Registrarme</a>
            </p>
        </div>
    </div>

    <footer class="footer" style="margin-top: auto; background-color: #1A1A2E; padding: 20px; text-align: center; font-size: 0.85rem; border-top: 1px solid #2A2A4E;">
        <p style="color: white; margin: 0;">&copy; 2026 NexaFlow Technologies | <a href="#" style="color: white; text-decoration: none; margin: 0 10px;">Aviso legal</a> | <a href="#" style="color: white; text-decoration: none; margin: 0 10px;">Contacto</a></p>
    </footer>

</body>
</html>
